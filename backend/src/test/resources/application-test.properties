# Test configuration - uses H2 in-memory database so we don't need a real PostgreSQL connection
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Fake secrets for testing - these are not real credentials
JWT_SECRET=this-is-a-test-secret-key-that-is-long-enough-for-hmac-sha256
GOOGLE_CLIENT_ID=fake-google-client-id-for-testing
